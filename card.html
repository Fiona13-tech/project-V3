


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Levels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .card {
      border: none;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .easy {
      border-bottom: 4px solid #28a745;
    }

    .medium {
      border-bottom: 4px solid #ffc107;
    }

    .hard {
      border-bottom: 4px solid #dc3545;
    }

    .btn-custom {
      border-radius: 20px;
      padding: 6px 20px;
    }

    .easy .btn-custom {
      background-color: #28a745;
      color: white;
    }

    .medium .btn-custom {
      background-color: #ffc107;
      color: black;
    }

    .hard .btn-custom {
      background-color: #dc3545;
      color: white;
    }

    h1 {
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container text-center mt-5">
  <h1>🎮 Game Levels</h1>
  <p class="text-light">Choose your difficulty</p>

  <div class="row mt-4">

    <!-- Level 1 -->
    <div class="col-md-4">
      <div class="card easy shadow">
        <img src="padpng.png" class="card-img-top">
        <div class="card-body">
          <h5>Level 1</h5>
          <p>Easy Mode</p>
           <h5>Easy mode</h5> <button class="btn btn-success" style="display: block; margin: 0 auto;"> <a href="Game 4/escape.html" class="text-white text-decoration-none">Play</a></button>
        </div>
      </div>
    </div>

    <!-- Level 2 -->
    <div class="col-md-4">
      <div class="card medium shadow">
        <img src="padpng.png" class="card-img-top">
        <div class="card-body">
          <h5>Level 2</h5>
          <p>Moderate Mode</p>
          <button class="btn btn-custom">Play</button>
        </div>
      </div>
    </div>

    <!-- Level 3 -->
    <div class="col-md-4">
      <div class="card hard shadow">
        <img src="padpng.png" class="card-img-top">
        <div class="card-body">
          <h5>Level 3</h5>
          <p>Hard Mode</p>
          <button class="btn btn-custom">Play</button>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
