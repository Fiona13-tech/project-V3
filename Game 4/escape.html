<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coin Chase Game</title>
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #008080;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    h1 {
      color: #FFD700;
      font-size: 26px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    #hud {
      display: flex;
      gap: 24px;
      color: #f7f7f7;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      padding: 14px 22px;
      background: rgba(0, 0, 0, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 22px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
      align-items: center;
    }

    #hud span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    }

    #hud span strong {
      display: inline-block;
      min-width: 40px;
      text-align: right;
      color: #fffb94;
    }

    #hud .hud-item {
      padding: 8px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* =============================================
       CANVAS — THIS IS THE ONLY CHANGE
       We remove the fixed width/height/aspect-ratio
       and just let it fill its container naturally.
       The JavaScript below does the rest.
    ============================================= */
    #canvasWrapper {
      width: 100%;
      max-width: 1200px;
    }

    canvas {
      border: 3px solid #ffa600;
      display: block;
      width: 100%;        /* fills the wrapper */
      height: auto;
      background-color: #b30909;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #message {
      color: white;
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
      min-height: 28px;
      letter-spacing: 0.5px;
    }

    #startBtn {
      margin-top: 10px;
      padding: 10px 30px;
      background: #00aa55;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    #startBtn:hover {
      background: #008844;
    }

    #controls {
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="text-center mb-4">
      <h1 class="display-6 text-warning">Welcome — Your Brain Is Going To Be Blown</h1>
    </div>

    <div id="hud" class="d-flex flex-column flex-sm-row justify-content-center align-items-center gap-2 mb-3">
      <span class="hud-item">💎 Score: <strong id="scoreDisplay">0</strong></span>
      <span class="hud-item">❤️ Lives: <strong id="livesDisplay">3</strong></span>
      <span class="hud-item">⚡ Level: <strong id="levelDisplay">1</strong></span>
      <span class="hud-item">✨ Boost: <strong id="rewardDisplay">0%</strong></span>
    </div>

    <!-- Wrapper div controls the width; canvas fills it -->
    <div class="row justify-content-center mb-3">
      <div id="canvasWrapper" class="col-12 col-md-10 col-lg-8 mx-auto">
        <canvas id="gameCanvas"></canvas>
      </div>
    </div>

    <div id="message" class="text-center text-white mb-3">Press Start to play!</div>

    <div class="d-grid gap-2 d-sm-flex justify-content-center flex-wrap mb-3">
      <button id="startBtn" type="button" class="btn btn-success btn-lg px-4">Start Game</button>
      <button id="pauseBtn" type="button" class="btn btn-warning btn-lg px-4 d-none">Pause</button>
      <button id="exitBtn" type="button" class="btn btn-danger btn-lg px-4" onclick="window.location='../card.html'">Exit Game</button>
    </div>

    <div id="controls" class="text-center text-white-50 small">
      Arrow keys to move &nbsp;|&nbsp;
      Blue block = Escape Zone (enemy slows down) &nbsp;|&nbsp;
      Collect coins to fill the boost meter and trigger a temporary power-up
    </div>
  </div>


  <script>
    // =============================================
    // CANVAS SETUP — RESPONSIVE SIZE
    //
    // Instead of hardcoding width/height on the
    // <canvas> tag, we measure the wrapper div
    // and set the canvas to match.
    //
    // We also listen for window resize so the
    // canvas always fits the screen.
    // =============================================
    const canvas  = document.getElementById('gameCanvas');
    const ctx     = canvas.getContext('2d');

    // This sets the canvas drawing resolution
    // to match its actual size on screen.
    function resizeCanvas() {
      const wrapper = document.getElementById('canvasWrapper');
      const w = wrapper.clientWidth;
      // Keep a 4:3 ratio — change the 0.75 to get a different shape
      // e.g. 0.5625 for 16:9 widescreen
      const h = Math.round(w * 0.75);
      canvas.width  = w;
      canvas.height = h;
    }

    resizeCanvas();  // run once on load

    // Run again whenever the window is resized
    window.addEventListener('resize', () => {
      resizeCanvas();
      // If the game is not running, just show a blue screen
      if (!running) {
        ctx.fillStyle = '#0000FF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    });

    // W and H now come from the canvas itself
    // They update automatically after resizeCanvas()
    // IMPORTANT: always use canvas.width / canvas.height
    // in your game logic — not W/H — if you want them
    // to reflect the latest size after a resize.
    let W = canvas.width;
    let H = canvas.height;

    // Keep W and H in sync after resize
    window.addEventListener('resize', () => {
      W = canvas.width;
      H = canvas.height;
    });

    ctx.fillStyle = '#0000FF';
    ctx.fillRect(0, 0, W, H);


    // =============================================
    // SOUND SYSTEM
    // =============================================
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }

    function playCoinSound() {
      const ac = getAudioCtx();
      const now = ac.currentTime;
      const chord = [880, 1047, 1318];
      chord.forEach((freq, index) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = index === 2 ? 'triangle' : 'sine';
        osc.frequency.setValueAtTime(freq, now);
        const delay = index * 0.03;
        const start = now + delay;
        gain.gain.setValueAtTime(0.0, start);
        gain.gain.linearRampToValueAtTime(0.35 - index * 0.08, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.35);
        osc.start(start);
        osc.stop(start + 0.35);
      });
      const click = ac.createOscillator();
      const clickGain = ac.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(1800, now + 0.08);
      click.connect(clickGain);
      clickGain.connect(ac.destination);
      clickGain.gain.setValueAtTime(0.2, now + 0.08);
      clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      click.start(now + 0.08);
      click.stop(now + 0.15);
    }

    function playCaughtSound() {
      const ac = getAudioCtx();
      const now = ac.currentTime;
      const bass = ac.createOscillator();
      const bassGain = ac.createGain();
      bass.type = 'triangle';
      bass.frequency.setValueAtTime(180, now);
      bass.frequency.exponentialRampToValueAtTime(90, now + 0.35);
      bass.connect(bassGain);
      bassGain.connect(ac.destination);
      bassGain.gain.setValueAtTime(0.45, now);
      bassGain.gain.exponentialRampToValueAtTime(0.002, now + 0.35);
      bass.start(now);
      bass.stop(now + 0.35);
      const hit = ac.createOscillator();
      const hitGain = ac.createGain();
      hit.type = 'sawtooth';
      hit.frequency.setValueAtTime(700, now);
      hit.frequency.exponentialRampToValueAtTime(220, now + 0.22);
      hit.connect(hitGain);
      hitGain.connect(ac.destination);
      hitGain.gain.setValueAtTime(0.26, now);
      hitGain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      hit.start(now);
      hit.stop(now + 0.28);
    }

    function playLevelUpSound() {
      const ac = getAudioCtx();
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = 'triangle';
        const t = ac.currentTime + i * 0.1;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.35, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t);
        osc.stop(t + 0.2);
      });
    }

    function playGameOverSound() {
      const ac = getAudioCtx();
      const now = ac.currentTime;
      const notes = [392, 330, 261, 196];
      notes.forEach((freq, i) => {
        const osc1 = ac.createOscillator();
        const osc2 = ac.createOscillator();
        const gain = ac.createGain();
        osc1.type = 'sine';
        osc2.type = 'triangle';
        osc1.frequency.setValueAtTime(freq, now);
        osc2.frequency.setValueAtTime(freq * 1.005, now);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(ac.destination);
        const t = now + i * 0.28;
        gain.gain.setValueAtTime(0.35, t);
        gain.gain.linearRampToValueAtTime(0.05, t + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        osc1.start(t);
        osc2.start(t);
        osc1.stop(t + 0.8);
        osc2.stop(t + 0.8);
      });
    }

    function playEscapeSound() {
      const ac   = getAudioCtx();
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.25);
    }

    function playStartSound() {
      const ac = getAudioCtx();
      [440, 660].forEach((freq, i) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = 'triangle';
        const t = ac.currentTime + i * 0.12;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        osc.start(t);
        osc.stop(t + 0.18);
      });
    }

    let bgMusicOsc1, bgMusicOsc2, bgMusicGain;
    function playBackgroundMusic() {
      const ac = getAudioCtx();
      if (bgMusicOsc1) return;
      bgMusicOsc1 = ac.createOscillator();
      bgMusicOsc2 = ac.createOscillator();
      bgMusicGain = ac.createGain();
      bgMusicOsc1.connect(bgMusicGain);
      bgMusicOsc2.connect(bgMusicGain);
      bgMusicGain.connect(ac.destination);
      bgMusicOsc1.type = 'sine';
      bgMusicOsc2.type = 'triangle';
      const notes = [261.63, 392.00];
      let noteIndex = 0;
      bgMusicOsc1.frequency.setValueAtTime(notes[noteIndex], ac.currentTime);
      bgMusicOsc2.frequency.setValueAtTime(notes[(noteIndex + 1) % 2], ac.currentTime);
      bgMusicGain.gain.setValueAtTime(0.1, ac.currentTime);
      bgMusicOsc1.start(ac.currentTime);
      bgMusicOsc2.start(ac.currentTime);
      setInterval(() => {
        noteIndex = (noteIndex + 1) % 2;
        bgMusicOsc1.frequency.setValueAtTime(notes[noteIndex], ac.currentTime);
        bgMusicOsc2.frequency.setValueAtTime(notes[(noteIndex + 1) % 2], ac.currentTime);
      }, 2000);
    }

    function stopBackgroundMusic() {
      if (bgMusicOsc1) {
        bgMusicOsc1.stop();
        bgMusicOsc2.stop();
        bgMusicOsc1 = null;
        bgMusicOsc2 = null;
      }
    }

    let wasHidingLastFrame = false;


    // =============================================
    // SHAPES — all use canvas.width / canvas.height
    // so they scale with the canvas automatically
    // =============================================
    const DIVIDER = { get x() { return canvas.width/2 + 15 }, get y() { return canvas.height/2 - 120 }, w: 10, h: 240 };

    let ESCAPE_BLOCK;
    let WALL_BLOCK;

    const CORNERS = [
      { get x() { return 0 },                    get y() { return 0 },                    w: 40, h: 40 },
      { get x() { return canvas.width - 40 },    get y() { return 0 },                    w: 40, h: 40 },
      { get x() { return 0 },                    get y() { return canvas.height - 40 },   w: 40, h: 40 },
      { get x() { return canvas.width - 40 },    get y() { return canvas.height - 40 },   w: 40, h: 40 },
    ];

    function getAllObstacles() {
      return [...CORNERS, WALL_BLOCK, DIVIDER];
    }


    // =============================================
    // GAME STATE
    // =============================================
    let score  = 0;
    let lives  = 3;
    let level  = 1;
    let running = false;
    let paused = false;
    let bgColor = '#008080';
    let invincibleFrames = 0;
    let rewardPoints = 0;
    let rewardActive = false;
    let rewardTimer = 0;
    let rewardPower = 1;
    let streak = 0;
    const REWARD_THRESHOLD = 100;
    const REWARD_DURATION = 5000;

    let player = {};
    let enemy  = {};
    let coins  = [];
    let coinParticles = [];
    let escapePulse = 0;
    let bgStars = [];
    let bgOffset = 0;
    let movingObstacles = [];
    let endlessMode = false;
    let endlessCoinsSpawnTime = 0;


    // =============================================
    // HELPERS
    // =============================================
    function overlapsAny(ax, ay, aw, ah, rectList) {
      for (const r of rectList) {
        if (ax < r.x + r.w && ax + aw > r.x && ay < r.y + r.h && ay + ah > r.y) return true;
      }
      return false;
    }

    function playerIsHiding() {
      return (
        player.x > ESCAPE_BLOCK.x &&
        player.x + player.w < ESCAPE_BLOCK.x + ESCAPE_BLOCK.w &&
        player.y > ESCAPE_BLOCK.y &&
        player.y + player.h < ESCAPE_BLOCK.y + ESCAPE_BLOCK.h
      );
    }


    // =============================================
    // COINS & PARTICLES
    // =============================================
    function spawnCoins(howMany) {
      const result = [];
      let attempts = 0;
      while (result.length < howMany && attempts < 1000) {
        attempts++;
        const cx = 100 + Math.random() * (canvas.width - 200);
        const cy = 100 + Math.random() * (canvas.height - 200);
        const r  = 9;
        const obstacles = [...getAllObstacles(), ESCAPE_BLOCK];
        if (overlapsAny(cx - r, cy - r, r * 2, r * 2, obstacles)) continue;
        const pdx = cx - (canvas.width / 2);
        const pdy = cy - (canvas.height / 2);
        if (Math.sqrt(pdx * pdx + pdy * pdy) < 100) continue;
        result.push({ x: cx, y: cy, r: r, collected: false });
      }
      return result;
    }

    function spawnCoinParticles(coin) {
      for (let i = 0; i < 14; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 40 + Math.random() * 120;
        coinParticles.push({
          x: coin.x, y: coin.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 1 + Math.random() * 2,
          life: 0,
          maxLife: 400 + Math.random() * 200,
          alpha: 1,
          color: i % 2 === 0 ? '#fff79a' : '#ffd700'
        });
      }
    }

    function updateParticles(deltaTime) {
      const dt = deltaTime / 1000;
      escapePulse += deltaTime / 500;
      for (let i = coinParticles.length - 1; i >= 0; i--) {
        const p = coinParticles[i];
        p.life += deltaTime;
        if (p.life >= p.maxLife) { coinParticles.splice(i, 1); continue; }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.alpha = 1 - p.life / p.maxLife;
      }
    }

    function activateReward(powerLevel) {
      rewardActive = true;
      rewardTimer = REWARD_DURATION + (powerLevel - 1) * 700;
      rewardPower = 1 + Math.min(0.6, powerLevel * 0.1);
      showMessage(`Reward x${powerLevel} active! Fast boost unlocked.`);
      document.getElementById('rewardDisplay').textContent = `ACTIVE x${powerLevel}`;
      playLevelUpSound();
    }

    function updateReward(deltaTime) {
      if (!rewardActive) return;
      rewardTimer -= deltaTime;
      if (rewardTimer <= 0) {
        rewardActive = false;
        rewardPower = 1;
        showMessage('Boost ended. Keep collecting!');
        document.getElementById('rewardDisplay').textContent = `${rewardPoints}%`;
      }
    }

    function drawParticles() {
      for (const p of coinParticles) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(${parseInt(p.color.slice(1,3),16)}, ${parseInt(p.color.slice(3,5),16)}, ${parseInt(p.color.slice(5,7),16)}, ${p.alpha})`;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function spawnMovingObstacles(count) {
      movingObstacles = [];
      for (let i = 0; i < count; i++) {
        const x = 150 + Math.random() * (canvas.width - 300);
        const y = 150 + Math.random() * (canvas.height - 300);
        const dirX = Math.random() > 0.5 ? 1 : -1;
        const dirY = Math.random() > 0.5 ? 1 : -1;
        movingObstacles.push({
          x, y, w: 40, h: 40,
          vx: dirX * (40 + Math.random() * 50),
          vy: dirY * (25 + Math.random() * 35),
          color: '#ff8c00'
        });
      }
    }

    function moveObstacles(deltaTime) {
      const dt = deltaTime / 1000;
      for (const obs of movingObstacles) {
        obs.x += obs.vx * dt;
        obs.y += obs.vy * dt;
        if (obs.x <= 0 || obs.x + obs.w >= canvas.width)  obs.vx *= -1;
        if (obs.y <= 0 || obs.y + obs.h >= canvas.height) obs.vy *= -1;
        obs.x = Math.max(0, Math.min(canvas.width  - obs.w, obs.x));
        obs.y = Math.max(0, Math.min(canvas.height - obs.h, obs.y));
      }
    }

    function createBackgroundStars(count = 100) {
      bgStars = [];
      for (let i = 0; i < count; i++) {
        bgStars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: 1 + Math.random() * 2,
          alpha: 0.15 + Math.random() * 0.25,
          speed: 10 + Math.random() * 30,
        });
      }
    }

    function updateBackground(deltaTime) {
      const dt = deltaTime / 1000;
      bgOffset += dt * 30;
      for (const star of bgStars) {
        star.y += star.speed * dt;
        if (star.y > canvas.height) star.y = 0;
      }
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#111111');
      gradient.addColorStop(0.35, bgColor);
      gradient.addColorStop(1, '#04070f');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      const gap = 140;
      const offset = bgOffset % gap;
      for (let x = -gap; x < canvas.width + gap; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x + offset, 0);
        ctx.lineTo(x - offset, canvas.height);
        ctx.stroke();
      }
      ctx.restore();

      for (const star of bgStars) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }


    // =============================================
    // INIT LEVEL
    // =============================================
    function initLevel() {
      // Update W and H in case canvas was resized
      W = canvas.width;
      H = canvas.height;

      const colors = ['#008080', '#800080', '#808000', '#008000', '#800000', '#000080'];
      bgColor = colors[(level - 1) % colors.length];

      if (level >= 10 && !endlessMode) {
        endlessMode = true;
        showMessage('ENDLESS MODE ACTIVATED!');
        setTimeout(() => { if (running) showMessage(''); }, 1500);
      }

      player = { x: W/2 - 10, y: H/2 - 10, w: 20, h: 20, speed: 200 };

      let placed = false;
      let attempts = 0;
      while (!placed && attempts < 100) {
        attempts++;
        const ex = 100 + Math.random() * (W - 260);
        const ey = 100 + Math.random() * (H - 260);
        const tempBlock = { x: ex, y: ey, w: 160, h: 160 };
        const centerArea = { x: W/2 - 50, y: H/2 - 50, w: 100, h: 100 };
        if (!overlapsAny(tempBlock.x, tempBlock.y, tempBlock.w, tempBlock.h, [DIVIDER, ...CORNERS, centerArea])) {
          ESCAPE_BLOCK = tempBlock;
          placed = true;
        }
      }

      placed = false;
      attempts = 0;
      while (!placed && attempts < 100) {
        attempts++;
        const wx = 100 + Math.random() * (W - 240);
        const wy = 100 + Math.random() * (H - 230);
        const tempBlock = { x: wx, y: wy, w: 140, h: 130 };
        const centerArea = { x: W/2 - 50, y: H/2 - 50, w: 100, h: 100 };
        if (!overlapsAny(tempBlock.x, tempBlock.y, tempBlock.w, tempBlock.h, [DIVIDER, ESCAPE_BLOCK, ...CORNERS, centerArea])) {
          WALL_BLOCK = tempBlock;
          placed = true;
        }
      }

      const side = Math.floor(Math.random() * 4);
      const edges = [
        { x: 100,     y: 100     },
        { x: W - 100, y: 100     },
        { x: 100,     y: H - 100 },
        { x: W - 100, y: H - 100 },
      ];
      enemy = { x: edges[side].x, y: edges[side].y, w: 20, h: 20, speed: 120 + (level * 20) };

      if (!bgStars.length) createBackgroundStars(120);
      coins = spawnCoins(4 + level * 2);
      spawnMovingObstacles(4);
      endlessCoinsSpawnTime = 0;
      invincibleFrames = 0;
    }


    // =============================================
    // KEYBOARD INPUT
    // =============================================
    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
      if (e.key === 'p' || e.key === ' ') {
        if (running) document.getElementById('pauseBtn').click();
      }
    });
    document.addEventListener('keyup', (e) => { keys[e.key] = false; });


    // =============================================
    // MOVE PLAYER
    // =============================================
    function movePlayer(deltaTime) {
      let dx = 0;
      let dy = 0;
      const playerSpeed = player.speed * rewardPower;
      if (keys['ArrowLeft']  || keys['a']) dx -= playerSpeed * (deltaTime / 1000);
      if (keys['ArrowRight'] || keys['d']) dx += playerSpeed * (deltaTime / 1000);
      if (keys['ArrowUp']    || keys['w']) dy -= playerSpeed * (deltaTime / 1000);
      if (keys['ArrowDown']  || keys['s']) dy += playerSpeed * (deltaTime / 1000);

      const obstacles = getAllObstacles();
      const newX = player.x + dx;
      if (newX >= 0 && newX + player.w <= canvas.width && !overlapsAny(newX, player.y, player.w, player.h, obstacles)) {
        player.x = newX;
      }
      const newY = player.y + dy;
      if (newY >= 0 && newY + player.h <= canvas.height && !overlapsAny(player.x, newY, player.w, player.h, obstacles)) {
        player.y = newY;
      }
    }


    // =============================================
    // MOVE ENEMY
    // =============================================
    function moveEnemy(deltaTime) {
      moveObstacles(deltaTime);
      const hiding = playerIsHiding();
      const currentSpeed = hiding ? 40 : enemy.speed * (rewardActive ? 0.7 : 1);
      const dx   = player.x - enemy.x;
      const dy   = player.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const stepX = (dx / dist) * currentSpeed * (deltaTime / 1000);
      const stepY = (dy / dist) * currentSpeed * (deltaTime / 1000);

      const newEX = enemy.x + stepX;
      if (newEX >= 0 && newEX + enemy.w <= canvas.width &&
          !overlapsAny(newEX, enemy.y, enemy.w, enemy.h, getAllObstacles()) &&
          !overlapsAny(newEX, enemy.y, enemy.w, enemy.h, [ESCAPE_BLOCK])) {
        enemy.x = newEX;
      }
      const newEY = enemy.y + stepY;
      if (newEY >= 0 && newEY + enemy.h <= canvas.height &&
          !overlapsAny(enemy.x, newEY, enemy.w, enemy.h, getAllObstacles()) &&
          !overlapsAny(enemy.x, newEY, enemy.w, enemy.h, [ESCAPE_BLOCK])) {
        enemy.y = newEY;
      }
    }


    // =============================================
    // CHECK COLLISIONS
    // =============================================
    function checkCollisions() {
      for (const coin of coins) {
        if (coin.collected) continue;
        const dx   = (player.x + player.w / 2) - coin.x;
        const dy   = (player.y + player.h / 2) - coin.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < coin.r + 12) {
          coin.collected = true;
          streak = Math.min(6, streak + 1);
          const comboBonus = streak * 5;
          const rewardGain = 10 + comboBonus;
          score += 10 * level + comboBonus;
          rewardPoints = Math.min(REWARD_THRESHOLD, rewardPoints + rewardGain);
          if (!rewardActive) {
            document.getElementById('rewardDisplay').textContent = `${rewardPoints}%`;
          }
          if (rewardPoints >= REWARD_THRESHOLD && !rewardActive) {
            rewardPoints -= REWARD_THRESHOLD;
            activateReward(streak);
          }
          document.getElementById('scoreDisplay').textContent = score;
          showMessage(`Combo x${streak}! +${rewardGain} reward`);
          playCoinSound();
          spawnCoinParticles(coin);
          if (endlessMode) { const newCoins = spawnCoins(1); coins.push(...newCoins); }
        }
      }

      for (const obs of movingObstacles) {
        if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
            player.y < obs.y + obs.h && player.y + player.h > obs.y) {
          if (invincibleFrames <= 0) {
            lives--;
            streak = 0;
            document.getElementById('livesDisplay').textContent = lives;
            invincibleFrames = 100;
            playCaughtSound();
            if (lives <= 0) { endGame(); return; }
            player.x = canvas.width/2 - 10;
            player.y = canvas.height/2 - 10;
            showMessage('Combo broken! Hit obstacle!');
            setTimeout(() => { if (running) showMessage(''); }, 1000);
          }
        }
      }

      if (invincibleFrames <= 0) {
        const dx   = (player.x + player.w / 2) - (enemy.x + enemy.w / 2);
        const dy   = (player.y + player.h / 2) - (enemy.y + enemy.h / 2);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 22) {
          lives--;
          streak = 0;
          document.getElementById('livesDisplay').textContent = lives;
          invincibleFrames = 100;
          playCaughtSound();
          if (lives <= 0) { endGame(); return; }
          player.x = canvas.width/2 - 10;
          player.y = canvas.height/2 - 10;
          showMessage('Combo broken! Caught!');
          setTimeout(() => { if (running) showMessage(''); }, 1200);
        }
      } else {
        invincibleFrames--;
      }

      if (!endlessMode && coins.every(c => c.collected)) {
        level++;
        document.getElementById('levelDisplay').textContent = level;
        playLevelUpSound();
        showMessage('Level ' + level + '!  Enemy is faster!');
        setTimeout(() => { if (running) showMessage(''); }, 1400);
        initLevel();
      }

      if (endlessMode) {
        endlessCoinsSpawnTime += 1;
        const difficultyMultiplier = 1 + (score / 5000);
        if (endlessCoinsSpawnTime > 300 / difficultyMultiplier) {
          endlessCoinsSpawnTime = 0;
          if (coins.filter(c => !c.collected).length < 3 + Math.floor(score / 2000)) {
            coins.push(...spawnCoins(1));
          }
          if (score > 0 && score % 1000 === 0) enemy.speed *= 1.05;
        }
      }
    }


    // =============================================
    // DRAW
    // =============================================
    function draw() {
      drawBackground();

      const hiding = playerIsHiding();
      const pulse = 1 + Math.sin(escapePulse) * 0.08;
      const blockW = ESCAPE_BLOCK.w * pulse;
      const blockH = ESCAPE_BLOCK.h * pulse;
      const blockX = ESCAPE_BLOCK.x - (blockW - ESCAPE_BLOCK.w) / 2;
      const blockY = ESCAPE_BLOCK.y - (blockH - ESCAPE_BLOCK.h) / 2;

      ctx.fillStyle   = hiding ? '#3344cc' : '#2a2aaa';
      ctx.fillRect(blockX, blockY, blockW, blockH);
      ctx.strokeStyle = hiding ? `rgba(136,170,255,${0.8 + Math.sin(escapePulse) * 0.1})` : `rgba(68,85,204,${0.7 + Math.sin(escapePulse) * 0.1})`;
      ctx.lineWidth   = 3;
      ctx.strokeRect(blockX, blockY, blockW, blockH);

      ctx.save();
      ctx.strokeStyle = hiding ? 'rgba(130,190,255,0.4)' : 'rgba(120,140,220,0.2)';
      ctx.lineWidth = 12;
      ctx.strokeRect(blockX - 4, blockY - 4, blockW + 8, blockH + 8);
      ctx.restore();

      ctx.fillStyle  = hiding ? '#ccddff' : 'rgba(180,180,255,0.7)';
      ctx.font       = 'bold 14px Arial';
      ctx.textAlign  = 'center';
      ctx.fillText(hiding ? 'HIDING!' : 'ESCAPE ZONE', ESCAPE_BLOCK.x + ESCAPE_BLOCK.w / 2, ESCAPE_BLOCK.y + ESCAPE_BLOCK.h / 2);

      ctx.fillStyle = '#111111';
      ctx.fillRect(WALL_BLOCK.x, WALL_BLOCK.y, WALL_BLOCK.w, WALL_BLOCK.h);

      ctx.fillStyle = '#111111';
      ctx.fillRect(DIVIDER.x, DIVIDER.y, DIVIDER.w, DIVIDER.h);

      ctx.fillStyle = '#111111';
      for (const corner of CORNERS) ctx.fillRect(corner.x, corner.y, corner.w, corner.h);

      for (const obs of movingObstacles) {
        ctx.fillStyle = obs.color;
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        ctx.strokeStyle = '#ffaa00';
        ctx.lineWidth = 2;
        ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
      }

      for (const coin of coins) {
        if (coin.collected) continue;
        const glow = ctx.createRadialGradient(coin.x, coin.y, coin.r * 0.4, coin.x, coin.y, coin.r * 2.5);
        glow.addColorStop(0, 'rgba(255, 255, 180, 0.8)');
        glow.addColorStop(0.6, 'rgba(255, 215, 100, 0.2)');
        glow.addColorStop(1, 'rgba(255, 215, 100, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.r * 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2);
        ctx.fillStyle   = '#FFD700';
        ctx.fill();
        ctx.strokeStyle = '#cc9900';
        ctx.lineWidth   = 1.5;
        ctx.stroke();
        ctx.fillStyle  = '#fff8aa';
        ctx.font       = 'bold 10px Arial';
        ctx.textAlign  = 'center';
        ctx.fillText('$', coin.x, coin.y + 4);
      }

      drawParticles();

      const isFlashing = invincibleFrames > 0 && Math.floor(invincibleFrames / 6) % 2 === 0;
      if (!isFlashing) {
        ctx.beginPath();
        ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w / 2, 0, Math.PI * 2);
        ctx.fillStyle = '#00ff88';
        ctx.fill();
        ctx.fillStyle  = '#003322';
        ctx.font       = 'bold 13px Arial';
        ctx.textAlign  = 'center';
        ctx.fillText('P', player.x + player.w / 2, player.y + player.h / 2 + 5);
      }

      ctx.beginPath();
      ctx.arc(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.w / 2, 0, Math.PI * 2);
      ctx.fillStyle = '#ff3333';
      ctx.fill();
      ctx.fillStyle  = '#330000';
      ctx.font       = 'bold 13px Arial';
      ctx.textAlign  = 'center';
      ctx.fillText('E', enemy.x + enemy.w / 2, enemy.y + enemy.h / 2 + 5);

      if (hiding) {
        ctx.fillStyle = 'rgba(100, 140, 255, 0.15)';
        ctx.fillRect(ESCAPE_BLOCK.x, ESCAPE_BLOCK.y, ESCAPE_BLOCK.w, ESCAPE_BLOCK.h);
      }
    }


    // =============================================
    // GAME LOOP
    // =============================================
    let lastTime = 0;

    function gameLoop(currentTime) {
      const deltaTime = currentTime - lastTime;
      lastTime = currentTime;
      if (!running) return;
      if (!paused) {
        movePlayer(deltaTime);
        moveEnemy(deltaTime);
        checkCollisions();
        updateReward(deltaTime);
        updateBackground(deltaTime);
        updateParticles(deltaTime);
        draw();
      }
      requestAnimationFrame(gameLoop);
    }


    // =============================================
    // START / END
    // =============================================
    function showMessage(text) {
      document.getElementById('message').textContent = text;
    }

    function endGame() {
      running = false;
      stopBackgroundMusic();
      playGameOverSound();
      showMessage('Game Over!  Final Score: ' + score);
      const btn = document.getElementById('startBtn');
      btn.textContent  = 'Play Again';
      btn.style.display = 'block';
      document.getElementById('pauseBtn').style.display = 'none';
    }

    document.getElementById('pauseBtn').addEventListener('click', () => {
      paused = !paused;
      document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
      showMessage(paused ? '⏸ Paused' : '');
    });

    function startGame() {
      // Resize canvas fresh before starting
      resizeCanvas();
      W = canvas.width;
      H = canvas.height;

      score  = 0;
      lives  = 3;
      level  = 1;
      running = true;
      paused = false;
      endlessMode = false;
      rewardPoints = 0;
      rewardActive = false;
      rewardTimer = 0;
      movingObstacles = [];
      endlessCoinsSpawnTime = 0;
      coinParticles = [];
      bgStars = [];
      document.getElementById('rewardDisplay').textContent = '0%';

      document.getElementById('pauseBtn').style.display = 'inline-block';
      document.getElementById('scoreDisplay').textContent = '0';
      document.getElementById('livesDisplay').textContent = '3';
      document.getElementById('levelDisplay').textContent = '1';
      document.getElementById('startBtn').style.display = 'none';

      showMessage('Reach Level 10 for Endless Mode!');
      playBackgroundMusic();
      initLevel();
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    document.getElementById('startBtn').addEventListener('click', startGame);

  </script>
</body>
