<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coin Chase Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #008080;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #topBar {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4px 8px;
      flex-shrink: 0;
    }

    #hud {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      color: #f7f7f7;
      font-size: clamp(10px, 2.5vw, 14px);
      font-weight: bold;
      padding: 6px 10px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      justify-content: center;
    }

    .hud-item {
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
    }

    .hud-item strong {
      color: #fffb94;
      min-width: 32px;
      display: inline-block;
      text-align: right;
    }

    #canvasArea {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      min-height: 0;
    }

    canvas {
      border: 2px solid #ffa600;
      display: block;
      background-color: #b30909;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    #bottomBar {
      width: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 8px;
      gap: 4px;
    }

    #message {
      color: white;
      font-size: clamp(11px, 3vw, 16px);
      font-weight: bold;
      min-height: 18px;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    }

    #btnRow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: clamp(12px, 3vw, 15px);
      cursor: pointer;
      font-weight: bold;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #startBtn  { background: #00aa55; color: white; }
    #pauseBtn  { background: #e6a800; color: white; display: none; }
    #exitBtn   { background: #cc2222; color: white; }
    #startBtn:hover  { background: #008844; }
    #pauseBtn:hover  { background: #c49000; }
    #exitBtn:hover   { background: #aa1111; }

    /* ── Touch D-Pad ── */
    #dpad {
      display: none;
      position: relative;
      width: min(140px, 30vw);
      height: min(140px, 30vw);
      margin: 0 auto;
      flex-shrink: 0;
    }

    .dpad-btn {
      position: absolute;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(14px, 4vw, 22px);
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      transition: background 0.1s;
      width: 33%;
      height: 33%;
      user-select: none;
    }

    .dpad-btn:active,
    .dpad-btn.pressed {
      background: rgba(255,255,255,0.42);
      border-color: rgba(255,255,255,0.7);
    }

    #dUp    { top: 0;   left: 33%; }
    #dDown  { bottom: 0; left: 33%; }
    #dLeft  { top: 33%; left: 0; }
    #dRight { top: 33%; right: 0; }
    #dCenter{
      top: 33%; left: 33%;
      background: rgba(0,0,0,0.15);
      border-color: transparent;
      cursor: default;
    }

    @keyframes livesFlash {
      0%   { color: #fffb94; transform: scale(1); }
      50%  { color: #ffd700; transform: scale(1.3); text-shadow: 0 0 10px gold; }
      100% { color: #fffb94; transform: scale(1); }
    }
    .lives-reset { animation: livesFlash 0.6s ease-in-out 2; display: inline-block; }
  </style>
</head>
<body>

<div id="topBar">
  <div id="hud">
    <span class="hud-item">💎 Score: <strong id="scoreDisplay">0</strong></span>
    <span class="hud-item">❤️ Lives: <strong id="livesDisplay">3</strong></span>
    <span class="hud-item">⚡ Level: <strong id="levelDisplay">1</strong></span>
    <span class="hud-item">✨ Boost: <strong id="rewardDisplay">0%</strong></span>
    <span class="hud-item">🏃 Speed: <strong id="speedDisplay">SLOW</strong></span>
  </div>
</div>

<div id="canvasArea">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="bottomBar">
  <div id="message">Press Start to play!</div>
  <div id="btnRow">
    <button id="startBtn"  class="game-btn">Start Game</button>
    <button id="pauseBtn"  class="game-btn">Pause</button>
    <button id="exitBtn"   class="game-btn" onclick="history.back()">Exit</button>
  </div>
  <div id="dpad">
    <div class="dpad-btn" id="dUp">▲</div>
    <div class="dpad-btn" id="dLeft">◀</div>
    <div class="dpad-btn" id="dCenter"></div>
    <div class="dpad-btn" id="dRight">▶</div>
    <div class="dpad-btn" id="dDown">▼</div>
  </div>
</div>

<script>
// ── Touch detection ──────────────────────────────
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isTouchDevice) {
  document.getElementById('dpad').style.display = 'block';
}

// ── Canvas setup ─────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function sizeCanvas() {
  const topH    = document.getElementById('topBar').offsetHeight;
  const botH    = document.getElementById('bottomBar').offsetHeight;
  const vw      = window.innerWidth;
  const vh      = window.innerHeight || document.documentElement.clientHeight;
  const avail   = vh - topH - botH - 16;
  const maxW    = vw - 16;

  let cw = Math.min(maxW, avail * (4/3));
  let ch = cw * (3/4);
  if (ch > avail) { ch = avail; cw = ch * (4/3); }

  // Enforce minimum playable size
  cw = Math.max(cw, 200);
  ch = Math.max(ch, 150);

  canvas.width  = Math.floor(cw);
  canvas.height = Math.floor(ch);
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}

sizeCanvas();

let W = canvas.width;
let H = canvas.height;

window.addEventListener('resize', () => {
  sizeCanvas();
  W = canvas.width;
  H = canvas.height;
  if (!running) {
    ctx.fillStyle = '#001122';
    ctx.fillRect(0, 0, W, H);
  }
});

ctx.fillStyle = '#001122';
ctx.fillRect(0, 0, W, H);

// ── Audio ─────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAC() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playCoinSound() {
  const ac = getAC(), now = ac.currentTime;
  [880, 1047, 1318].forEach((freq, i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = i===2?'triangle':'sine';
    o.frequency.value = freq;
    const t = now + i*0.03;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.35-i*0.08, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    o.start(t); o.stop(t+0.35);
  });
}
function playCaughtSound() {
  const ac = getAC(), now = ac.currentTime;
  const b = ac.createOscillator(), bg = ac.createGain();
  b.type='triangle'; b.frequency.setValueAtTime(180,now); b.frequency.exponentialRampToValueAtTime(90,now+0.35);
  b.connect(bg); bg.connect(ac.destination);
  bg.gain.setValueAtTime(0.45,now); bg.gain.exponentialRampToValueAtTime(0.002,now+0.35);
  b.start(now); b.stop(now+0.35);
  const h = ac.createOscillator(), hg = ac.createGain();
  h.type='sawtooth'; h.frequency.setValueAtTime(700,now); h.frequency.exponentialRampToValueAtTime(220,now+0.22);
  h.connect(hg); hg.connect(ac.destination);
  hg.gain.setValueAtTime(0.26,now); hg.gain.exponentialRampToValueAtTime(0.001,now+0.28);
  h.start(now); h.stop(now+0.28);
}
function playLevelUpSound() {
  const ac = getAC();
  [523,659,784,1047].forEach((f,i) => {
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='triangle';
    const t=ac.currentTime+i*0.1;
    o.frequency.value=f; g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    o.start(t); o.stop(t+0.2);
  });
}
function playGameOverSound() {
  const ac = getAC(), now = ac.currentTime;
  [392,330,261,196].forEach((f,i) => {
    const o1=ac.createOscillator(), o2=ac.createOscillator(), g=ac.createGain();
    o1.type='sine'; o2.type='triangle';
    o1.frequency.value=f; o2.frequency.value=f*1.005;
    o1.connect(g); o2.connect(g); g.connect(ac.destination);
    const t=now+i*0.28;
    g.gain.setValueAtTime(0.35,t); g.gain.linearRampToValueAtTime(0.05,t+0.2); g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
    o1.start(t); o2.start(t); o1.stop(t+0.8); o2.stop(t+0.8);
  });
}
function playStartSound() {
  const ac = getAC();
  [440,660].forEach((f,i) => {
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='triangle';
    const t=ac.currentTime+i*0.12;
    o.frequency.value=f; g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.start(t); o.stop(t+0.18);
  });
}
let bgOsc1, bgOsc2, bgGain;
function playBGMusic() {
  const ac = getAC();
  if (bgOsc1) return;
  bgOsc1 = ac.createOscillator(); bgOsc2 = ac.createOscillator();
  bgGain = ac.createGain();
  bgOsc1.connect(bgGain); bgOsc2.connect(bgGain); bgGain.connect(ac.destination);
  bgOsc1.type='sine'; bgOsc2.type='triangle';
  const notes=[261.63,392.00]; let ni=0;
  bgOsc1.frequency.value=notes[ni]; bgOsc2.frequency.value=notes[(ni+1)%2];
  bgGain.gain.value=0.08;
  bgOsc1.start(); bgOsc2.start();
  setInterval(()=>{ ni=(ni+1)%2; bgOsc1.frequency.value=notes[ni]; bgOsc2.frequency.value=notes[(ni+1)%2]; },2000);
}
function stopBGMusic() {
  if (bgOsc1) { try{bgOsc1.stop();}catch(e){} try{bgOsc2.stop();}catch(e){} bgOsc1=bgOsc2=null; }
}

// ── Shapes ────────────────────────────────────────
// FIX: Use plain objects updated in initLevel instead of getters
// so they're never undefined when allObs() is called
let DIVIDER   = { x:0, y:0, w:0, h:0 };
let ESCAPE_BLOCK = { x:0, y:0, w:80, h:80 };
let WALL_BLOCK   = { x:0, y:0, w:80, h:80 };
let CORNERS = [];

function buildStaticShapes() {
  const cw = canvas.width, ch = canvas.height;

  // Scale divider to canvas size
  DIVIDER.x = cw/2 + Math.floor(cw*0.04);
  DIVIDER.y = ch/2  - Math.floor(ch*0.35);
  DIVIDER.w = Math.max(6, Math.floor(cw*0.015));
  DIVIDER.h = Math.floor(ch*0.7);

  // Scale corners (min 20px, max 40px)
  const cs = Math.min(40, Math.max(20, Math.floor(Math.min(cw,ch)*0.07)));
  CORNERS = [
    { x:0,      y:0,      w:cs, h:cs },
    { x:cw-cs,  y:0,      w:cs, h:cs },
    { x:0,      y:ch-cs,  w:cs, h:cs },
    { x:cw-cs,  y:ch-cs,  w:cs, h:cs },
  ];
}

// FIX: allObs() guards against undefined blocks
function allObs() {
  const obs = [...CORNERS, DIVIDER];
  if (WALL_BLOCK)   obs.push(WALL_BLOCK);
  if (ESCAPE_BLOCK) obs.push(ESCAPE_BLOCK);
  return obs;
}

// ── Game state ────────────────────────────────────
let score=0, lives=3, level=1, running=false, paused=false;
let bgColor='#008080';
let invincibleFrames=0;
let rewardPoints=0, rewardActive=false, rewardTimer=0, rewardPower=1, streak=0;
const REWARD_THRESHOLD=100, REWARD_DURATION=5000;
let player={}, enemy={}, coins=[], coinParticles=[], escapePulse=0;
let bgStars=[], bgOffset=0, movingObstacles=[], endlessMode=false, endlessCoinsTime=0;

function enemySpeed() { return Math.min(65+(level-1)*8, 250); }

function updateSpeedDisplay() {
  const s = enemySpeed();
  const t = s<=75?'🐢 VERY SLOW': s<=95?'🚶 SLOW': s<=125?'🏃 MEDIUM': s<=165?'💨 FAST':'⚡ VERY FAST';
  document.getElementById('speedDisplay').textContent = t;
}

// ── Helpers ───────────────────────────────────────
function overlaps(ax,ay,aw,ah,rects) {
  for (const r of rects) {
    // FIX: skip any rect that is undefined or missing x
    if (!r || r.x === undefined) continue;
    if (ax<r.x+r.w && ax+aw>r.x && ay<r.y+r.h && ay+ah>r.y) return true;
  }
  return false;
}

function playerHiding() {
  if (!ESCAPE_BLOCK) return false;
  return player.x>ESCAPE_BLOCK.x && player.x+player.w<ESCAPE_BLOCK.x+ESCAPE_BLOCK.w
      && player.y>ESCAPE_BLOCK.y && player.y+player.h<ESCAPE_BLOCK.y+ESCAPE_BLOCK.h;
}

// ── Coins ─────────────────────────────────────────
function spawnCoins(n) {
  const res=[]; let att=0;
  const margin = Math.floor(Math.min(canvas.width, canvas.height) * 0.12);
  while (res.length<n && att<2000) {
    att++;
    const cx = margin + Math.random()*(canvas.width - margin*2);
    const cy = margin + Math.random()*(canvas.height - margin*2);
    const r=Math.max(5, Math.floor(Math.min(canvas.width,canvas.height)*0.018));
    const safeObs = [...CORNERS, DIVIDER];
    if (WALL_BLOCK)   safeObs.push(WALL_BLOCK);
    if (ESCAPE_BLOCK) safeObs.push(ESCAPE_BLOCK);
    if (overlaps(cx-r, cy-r, r*2, r*2, safeObs)) continue;
    const pdx=cx-canvas.width/2, pdy=cy-canvas.height/2;
    if (Math.sqrt(pdx*pdx+pdy*pdy)<60) continue;
    res.push({x:cx, y:cy, r, collected:false});
  }
  return res;
}

function spawnParticles(coin) {
  for (let i=0;i<14;i++) {
    const a=Math.random()*Math.PI*2, sp=40+Math.random()*120;
    coinParticles.push({
      x:coin.x, y:coin.y,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:1+Math.random()*2, life:0, maxLife:400+Math.random()*200,
      alpha:1, color:i%2===0?'#fff79a':'#ffd700'
    });
  }
}
function updateParticles(dt) {
  const s=dt/1000; escapePulse+=dt/500;
  for (let i=coinParticles.length-1;i>=0;i--) {
    const p=coinParticles[i]; p.life+=dt;
    if (p.life>=p.maxLife){coinParticles.splice(i,1);continue;}
    p.x+=p.vx*s; p.y+=p.vy*s; p.alpha=1-p.life/p.maxLife;
  }
}
function activateReward(pw) {
  rewardActive=true; rewardTimer=REWARD_DURATION+(pw-1)*700; rewardPower=1+Math.min(0.6,pw*0.1);
  showMsg(`Reward x${pw} active!`);
  document.getElementById('rewardDisplay').textContent=`ACTIVE x${pw}`;
  playLevelUpSound();
}
function updateReward(dt) {
  if (!rewardActive) return;
  rewardTimer-=dt;
  if (rewardTimer<=0) {
    rewardActive=false; rewardPower=1;
    showMsg('Boost ended!');
    document.getElementById('rewardDisplay').textContent=`${rewardPoints}%`;
  }
}

// ── Moving obstacles ──────────────────────────────
function obsSpeed() {
  // Starts at 18px/s on level 1, grows by ~10 per level, capped at 180
  return Math.min(18 + (level - 1) * 10, 180);
}
function spawnMovingObs(n) {
  movingObstacles=[];
  const obsSize = Math.max(20, Math.floor(Math.min(canvas.width,canvas.height)*0.07));
  const baseSpeed = obsSpeed();
  for (let i=0;i<n;i++) {
    // Each block gets speed within ±30% of base so they feel varied but not chaotic
    const spd = baseSpeed * (0.7 + Math.random()*0.6);
    movingObstacles.push({
      x: obsSize*2 + Math.random()*(canvas.width  - obsSize*4),
      y: obsSize*2 + Math.random()*(canvas.height - obsSize*4),
      w: obsSize, h: obsSize,
      vx:(Math.random()>0.5?1:-1)*spd,
      vy:(Math.random()>0.5?1:-1)*(spd*0.6),
      color:'#ff8c00'
    });
  }
}
function moveObs(dt) {
  const s=dt/1000;
  for (const o of movingObstacles) {
    o.x+=o.vx*s; o.y+=o.vy*s;
    if (o.x<=0||o.x+o.w>=canvas.width) o.vx*=-1;
    if (o.y<=0||o.y+o.h>=canvas.height) o.vy*=-1;
    o.x=Math.max(0,Math.min(canvas.width-o.w,o.x));
    o.y=Math.max(0,Math.min(canvas.height-o.h,o.y));
  }
}

// ── Background ────────────────────────────────────
function createStars(n=100) {
  bgStars=[];
  for (let i=0;i<n;i++) bgStars.push({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:1+Math.random()*2, alpha:0.15+Math.random()*0.25, speed:10+Math.random()*30
  });
}
function updateBG(dt) {
  const s=dt/1000; bgOffset+=s*30;
  for (const st of bgStars) { st.y+=st.speed*s; if(st.y>canvas.height) st.y=0; }
}
function drawBG() {
  const g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#111111'); g.addColorStop(0.35,bgColor); g.addColorStop(1,'#04070f');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save(); ctx.globalAlpha=0.08; ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
  const gap=140, off=bgOffset%gap;
  for (let x=-gap;x<canvas.width+gap;x+=gap) {
    ctx.beginPath(); ctx.moveTo(x+off,0); ctx.lineTo(x-off,canvas.height); ctx.stroke();
  }
  ctx.restore();
  for (const st of bgStars) {
    ctx.beginPath(); ctx.fillStyle=`rgba(255,255,255,${st.alpha})`;
    ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fill();
  }
}

// ── Init level ────────────────────────────────────
function initLevel() {
  W = canvas.width;
  H = canvas.height;

  buildStaticShapes(); // FIX: always rebuild shapes for current canvas size

  const colors=['#008080','#800080','#808000','#008000','#800000','#000080'];
  bgColor=colors[(level-1)%colors.length];
  if (level>=10&&!endlessMode) { endlessMode=true; showMsg('ENDLESS MODE!'); setTimeout(()=>{if(running)showMsg('');},1500); }

  player={x:W/2-10, y:H/2-10, w:20, h:20, speed:200};

  // FIX: Scale block sizes to canvas; use generous fallback positions
  const blkW = Math.min(160, Math.floor(W * 0.28));
  const blkH = Math.min(160, Math.floor(H * 0.28));
  const wallW = Math.min(140, Math.floor(W * 0.25));
  const wallH = Math.min(130, Math.floor(H * 0.25));

  // Try to place ESCAPE_BLOCK; fallback to top-left quadrant
  let placed=false, att=0;
  while (!placed && att<200) {
    att++;
    const ex = blkW/2 + Math.random()*(W - blkW*1.5);
    const ey = blkH/2 + Math.random()*(H - blkH*1.5);
    const t = {x:ex, y:ey, w:blkW, h:blkH};
    const centerAvoid = {x:W/2-50, y:H/2-50, w:100, h:100};
    if (!overlaps(t.x, t.y, t.w, t.h, [DIVIDER, ...CORNERS, centerAvoid])) {
      ESCAPE_BLOCK = t; placed=true;
    }
  }
  if (!placed) {
    // Guaranteed fallback — top-left area
    ESCAPE_BLOCK = { x: Math.floor(W*0.05), y: Math.floor(H*0.05), w: blkW, h: blkH };
  }

  // Try to place WALL_BLOCK; fallback to bottom-right quadrant
  placed=false; att=0;
  while (!placed && att<200) {
    att++;
    const wx = wallW/2 + Math.random()*(W - wallW*1.5);
    const wy = wallH/2 + Math.random()*(H - wallH*1.5);
    const t = {x:wx, y:wy, w:wallW, h:wallH};
    const centerAvoid = {x:W/2-50, y:H/2-50, w:100, h:100};
    if (!overlaps(t.x, t.y, t.w, t.h, [DIVIDER, ESCAPE_BLOCK, ...CORNERS, centerAvoid])) {
      WALL_BLOCK = t; placed=true;
    }
  }
  if (!placed) {
    // Guaranteed fallback — bottom-right area
    WALL_BLOCK = { x: Math.floor(W*0.6), y: Math.floor(H*0.6), w: wallW, h: wallH };
  }

  const cs = CORNERS[0] ? CORNERS[0].w : 20;
  const edges=[
    {x:cs+10, y:cs+10},
    {x:W-cs-30, y:cs+10},
    {x:cs+10, y:H-cs-30},
    {x:W-cs-30, y:H-cs-30}
  ];
  const sp=Math.floor(Math.random()*4);
  enemy={x:edges[sp].x, y:edges[sp].y, w:20, h:20, speed:enemySpeed()};
  updateSpeedDisplay();

  if (!bgStars.length) createStars(120);
  coins=spawnCoins(4+level*2);
  spawnMovingObs(4);
  endlessCoinsTime=0; invincibleFrames=0;

  if (level>1) {
    lives=3;
    document.getElementById('livesDisplay').textContent=lives;
    const el=document.getElementById('livesDisplay');
    el.classList.add('lives-reset');
    setTimeout(()=>el.classList.remove('lives-reset'),600);
    showMsg(`❤️ Lives reset! Level ${level}!`);
    setTimeout(()=>{ if(running&&!paused)showMsg(''); },2000);
  }
}

// ── Keyboard input ────────────────────────────────
const keys={};
document.addEventListener('keydown', e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(e.key==='p'||e.key===' ') { if(running) document.getElementById('pauseBtn').click(); }
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

// ── Touch D-Pad ───────────────────────────────────
const dpadMap = {
  dUp:    'ArrowUp',
  dDown:  'ArrowDown',
  dLeft:  'ArrowLeft',
  dRight: 'ArrowRight'
};

function attachDpadButton(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const key = dpadMap[id];
  const press   = (e) => { e.preventDefault(); keys[key]=true;  el.classList.add('pressed'); };
  const release = (e) => { e.preventDefault(); keys[key]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  press,   { passive: false });
  el.addEventListener('touchend',    release, { passive: false });
  el.addEventListener('touchcancel', release, { passive: false });
  el.addEventListener('mousedown',   press);
  el.addEventListener('mouseup',     release);
  el.addEventListener('mouseleave',  release);
}
['dUp','dDown','dLeft','dRight'].forEach(attachDpadButton);

// ── Swipe on canvas ───────────────────────────────
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.touches[0];
  touchStartX=t.clientX; touchStartY=t.clientY;
}, {passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t=e.touches[0];
  const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
  const DEAD=12;
  keys['ArrowUp']=keys['ArrowDown']=keys['ArrowLeft']=keys['ArrowRight']=false;
  if (Math.abs(dx)>Math.abs(dy)) {
    if (dx>DEAD)  keys['ArrowRight']=true;
    if (dx<-DEAD) keys['ArrowLeft']=true;
  } else {
    if (dy>DEAD)  keys['ArrowDown']=true;
    if (dy<-DEAD) keys['ArrowUp']=true;
  }
}, {passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  keys['ArrowUp']=keys['ArrowDown']=keys['ArrowLeft']=keys['ArrowRight']=false;
}, {passive:false});

// ── Move player ───────────────────────────────────
function movePlayer(dt) {
  let dx=0, dy=0;
  const sp=player.speed*rewardPower*(dt/1000);
  if (keys['ArrowLeft'] ||keys['a']) dx-=sp;
  if (keys['ArrowRight']||keys['d']) dx+=sp;
  if (keys['ArrowUp']   ||keys['w']) dy-=sp;
  if (keys['ArrowDown'] ||keys['s']) dy+=sp;
  const obs=[...CORNERS, DIVIDER, WALL_BLOCK].filter(Boolean);
  const nx=player.x+dx;
  if (nx>=0&&nx+player.w<=canvas.width&&!overlaps(nx,player.y,player.w,player.h,obs)) player.x=nx;
  const ny=player.y+dy;
  if (ny>=0&&ny+player.h<=canvas.height&&!overlaps(player.x,ny,player.w,player.h,obs)) player.y=ny;
}

// ── Move enemy ────────────────────────────────────
function moveEnemy(dt) {
  moveObs(dt);
  const hiding=playerHiding();
  const sp=hiding?40:enemy.speed*(rewardActive?0.7:1);
  const dx=player.x-enemy.x, dy=player.y-enemy.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const sx=(dx/dist)*sp*(dt/1000), sy=(dy/dist)*sp*(dt/1000);
  const exc=[...CORNERS, DIVIDER, ESCAPE_BLOCK, WALL_BLOCK].filter(Boolean);
  const nex=enemy.x+sx;
  if (nex>=0&&nex+enemy.w<=canvas.width&&!overlaps(nex,enemy.y,enemy.w,enemy.h,exc)) enemy.x=nex;
  const ney=enemy.y+sy;
  if (ney>=0&&ney+enemy.h<=canvas.height&&!overlaps(enemy.x,ney,enemy.w,enemy.h,exc)) enemy.y=ney;
}

// ── Check collisions ──────────────────────────────
function checkCollisions() {
  for (const c of coins) {
    if (c.collected) continue;
    const dx=(player.x+player.w/2)-c.x, dy=(player.y+player.h/2)-c.y;
    if (Math.sqrt(dx*dx+dy*dy)<c.r+12) {
      c.collected=true; streak=Math.min(6,streak+1);
      const bonus=streak*5, gain=10+bonus;
      score+=10*level+bonus;
      rewardPoints=Math.min(REWARD_THRESHOLD,rewardPoints+gain);
      if (!rewardActive) document.getElementById('rewardDisplay').textContent=`${rewardPoints}%`;
      if (rewardPoints>=REWARD_THRESHOLD&&!rewardActive) { rewardPoints-=REWARD_THRESHOLD; activateReward(streak); }
      document.getElementById('scoreDisplay').textContent=score;
      showMsg(`Combo x${streak}! +${gain}`);
      playCoinSound(); spawnParticles(c);
      if (endlessMode) coins.push(...spawnCoins(1));
    }
  }

  for (const o of movingObstacles) {
    if (player.x<o.x+o.w&&player.x+player.w>o.x&&player.y<o.y+o.h&&player.y+player.h>o.y) {
      if (invincibleFrames<=0) {
        lives--; streak=0; document.getElementById('livesDisplay').textContent=lives;
        invincibleFrames=100; playCaughtSound();
        if (lives<=0){endGame();return;}
        player.x=canvas.width/2-10; player.y=canvas.height/2-10;
        showMsg('Hit obstacle!'); setTimeout(()=>{if(running)showMsg('');},1000);
      }
    }
  }

  if (invincibleFrames<=0) {
    const dx=(player.x+player.w/2)-(enemy.x+enemy.w/2), dy=(player.y+player.h/2)-(enemy.y+enemy.h/2);
    if (Math.sqrt(dx*dx+dy*dy)<22) {
      lives--; streak=0; document.getElementById('livesDisplay').textContent=lives;
      invincibleFrames=100; playCaughtSound();
      if (lives<=0){endGame();return;}
      player.x=canvas.width/2-10; player.y=canvas.height/2-10;
      showMsg('Caught!'); setTimeout(()=>{if(running)showMsg('');},1200);
    }
  } else { invincibleFrames--; }

  if (!endlessMode&&coins.every(c=>c.collected)) {
    level++; document.getElementById('levelDisplay').textContent=level;
    playLevelUpSound(); showMsg(`Level ${level}!`);
    setTimeout(()=>{if(running)showMsg('');},1400);
    initLevel();
  }

  if (endlessMode) {
    endlessCoinsTime++;
    const dm=1+(score/5000);
    if (endlessCoinsTime>300/dm) {
      endlessCoinsTime=0;
      if (coins.filter(c=>!c.collected).length<3+Math.floor(score/2000)) coins.push(...spawnCoins(1));
      if (score>0&&score%1000===0) enemy.speed*=1.05;
    }
  }
}

// ── Draw ──────────────────────────────────────────
function drawParticles() {
  for (const p of coinParticles) {
    const hex=p.color.slice(1);
    const r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
    ctx.beginPath(); ctx.fillStyle=`rgba(${r},${g},${b},${p.alpha})`;
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
}

function draw() {
  drawBG();
  if (!ESCAPE_BLOCK || !WALL_BLOCK) return; // safety guard

  const hiding=playerHiding();
  const pulse=1+Math.sin(escapePulse)*0.08;
  const bw=ESCAPE_BLOCK.w*pulse, bh=ESCAPE_BLOCK.h*pulse;
  const bx=ESCAPE_BLOCK.x-(bw-ESCAPE_BLOCK.w)/2, by=ESCAPE_BLOCK.y-(bh-ESCAPE_BLOCK.h)/2;

  ctx.fillStyle=hiding?'#3344cc':'#2a2aaa'; ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle=hiding?`rgba(136,170,255,${0.8+Math.sin(escapePulse)*0.1})`:`rgba(68,85,204,${0.7+Math.sin(escapePulse)*0.1})`;
  ctx.lineWidth=3; ctx.strokeRect(bx,by,bw,bh);
  ctx.save(); ctx.strokeStyle=hiding?'rgba(130,190,255,0.4)':'rgba(120,140,220,0.2)';
  ctx.lineWidth=12; ctx.strokeRect(bx-4,by-4,bw+8,bh+8); ctx.restore();

  ctx.fillStyle=hiding?'#ccddff':'rgba(180,180,255,0.7)';
  ctx.font=`bold ${Math.max(8, Math.floor(canvas.width/80))}px Arial`; ctx.textAlign='center';
  ctx.fillText(hiding?'HIDING!':'ESCAPE', ESCAPE_BLOCK.x+ESCAPE_BLOCK.w/2, ESCAPE_BLOCK.y+ESCAPE_BLOCK.h/2);

  ctx.fillStyle='#111111';
  ctx.fillRect(WALL_BLOCK.x,WALL_BLOCK.y,WALL_BLOCK.w,WALL_BLOCK.h);
  ctx.fillRect(DIVIDER.x,DIVIDER.y,DIVIDER.w,DIVIDER.h);
  for (const c of CORNERS) ctx.fillRect(c.x,c.y,c.w,c.h);

  for (const o of movingObstacles) {
    ctx.fillStyle=o.color; ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.strokeStyle='#ffaa00'; ctx.lineWidth=2; ctx.strokeRect(o.x,o.y,o.w,o.h);
  }

  for (const c of coins) {
    if (c.collected) continue;
    const g=ctx.createRadialGradient(c.x,c.y,c.r*0.4,c.x,c.y,c.r*2.5);
    g.addColorStop(0,'rgba(255,255,180,0.8)'); g.addColorStop(0.6,'rgba(255,215,100,0.2)'); g.addColorStop(1,'rgba(255,215,100,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(c.x,c.y,c.r*2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fillStyle='#FFD700'; ctx.fill(); ctx.strokeStyle='#cc9900'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#fff8aa'; ctx.font=`bold ${Math.max(7, Math.floor(canvas.width/100))}px Arial`; ctx.textAlign='center';
    ctx.fillText('$',c.x,c.y+4);
  }

  drawParticles();

  const flash=invincibleFrames>0&&Math.floor(invincibleFrames/6)%2===0;
  if (!flash) {
    ctx.beginPath(); ctx.arc(player.x+player.w/2,player.y+player.h/2,player.w/2,0,Math.PI*2);
    ctx.fillStyle='#00ff88'; ctx.fill();
    ctx.fillStyle='#003322'; ctx.font=`bold ${Math.max(9,Math.floor(canvas.width/90))}px Arial`; ctx.textAlign='center';
    ctx.fillText('P',player.x+player.w/2,player.y+player.h/2+5);
  }

  ctx.beginPath(); ctx.arc(enemy.x+enemy.w/2,enemy.y+enemy.h/2,enemy.w/2,0,Math.PI*2);
  ctx.fillStyle='#ff3333'; ctx.fill();
  ctx.fillStyle='#330000'; ctx.font=`bold ${Math.max(9,Math.floor(canvas.width/90))}px Arial`; ctx.textAlign='center';
  ctx.fillText('E',enemy.x+enemy.w/2,enemy.y+enemy.h/2+5);

  if (hiding) {
    ctx.fillStyle='rgba(100,140,255,0.15)';
    ctx.fillRect(ESCAPE_BLOCK.x,ESCAPE_BLOCK.y,ESCAPE_BLOCK.w,ESCAPE_BLOCK.h);
  }
}

// ── Game loop ─────────────────────────────────────
let lastTime=0;
function gameLoop(ts) {
  const dt=Math.min(ts-lastTime, 100); // FIX: cap dt to avoid huge jumps on tab switch
  lastTime=ts;
  if (!running) return;
  if (!paused) {
    movePlayer(dt); moveEnemy(dt); checkCollisions();
    updateReward(dt); updateBG(dt); updateParticles(dt);
    draw();
  }
  requestAnimationFrame(gameLoop);
}

// ── UI helpers ────────────────────────────────────
function showMsg(t) { document.getElementById('message').textContent=t; }

function endGame() {
  running=false; stopBGMusic(); playGameOverSound();
  showMsg('Game Over! Score: '+score);
  document.getElementById('startBtn').textContent='Play Again';
  document.getElementById('startBtn').style.display='';
  document.getElementById('pauseBtn').style.display='none';
}

document.getElementById('pauseBtn').addEventListener('click', ()=>{
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'Resume':'Pause';
  showMsg(paused?'⏸ Paused':'');
});

function startGame() {
  if (!audioCtx) { audioCtx = new AudioCtx(); }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  sizeCanvas(); W=canvas.width; H=canvas.height;
  buildStaticShapes(); // FIX: build shapes before initLevel

  score=0; lives=3; level=1; running=true; paused=false; endlessMode=false;
  rewardPoints=0; rewardActive=false; rewardTimer=0; rewardPower=1; streak=0;
  movingObstacles=[]; endlessCoinsTime=0; coinParticles=[]; bgStars=[];
  document.getElementById('rewardDisplay').textContent='0%';
  document.getElementById('pauseBtn').style.display='inline-block';
  document.getElementById('scoreDisplay').textContent='0';
  document.getElementById('livesDisplay').textContent='3';
  document.getElementById('levelDisplay').textContent='1';
  document.getElementById('startBtn').style.display='none';
  updateSpeedDisplay();
  showMsg('🐢 Starts SLOW! Collect coins!');
  playStartSound(); playBGMusic();
  initLevel();
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').addEventListener('click', startGame);

document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
</script>
